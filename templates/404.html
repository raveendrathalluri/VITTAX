<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #1e3a8a;
            --primary-blue: #2563eb;
            --primary-light: #3b82f6;
            --background-light: #e0eef7;
            --card-white: #ffffff;
            --text-dark: #1a1a2e;
            --text-gray: #6b7280;
            --text-light: #9ca3af;
            --success-green: #10b981;
            --warning-orange: #f59e0b;
            --danger-red: #ef4444;
            --border-light: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--background-light) 0%, #f0f9ff 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ── Floating Background Elements ── */
        .floating-element {
            position: fixed;
            opacity: 0.08;
            font-weight: 900;
            pointer-events: none;
            z-index: 0;
        }

        .float-1 {
            font-size: 20rem;
            top: 5%;
            left: 5%;
            color: var(--primary-blue);
            animation: float 8s ease-in-out infinite;
        }

        .float-2 {
            font-size: 18rem;
            bottom: 10%;
            right: 8%;
            color: var(--primary-dark);
            animation: float 10s ease-in-out infinite 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(5deg);
            }
        }

        /* ── Container ── */
        .error-container {
            text-align: center;
            max-width: 700px;
            z-index: 10;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Error Code ── */
        .error-code {
            font-size: 9rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1;
            animation: slideDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: -3px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Error Icon ── */
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(15deg);
            }
        }

        /* ── Title ── */
        .error-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 16px;
            animation: slideUp 0.8s ease 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Description ── */
        .error-description {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 40px;
            line-height: 1.8;
            animation: slideUp 0.8s ease 0.3s both;
        }

        /* ── Card Content ── */
        .error-card {
            background: var(--card-white);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            animation: slideUp 0.8s ease 0.4s both;
            border: 1px solid var(--border-light);
        }

        .card-section {
            text-align: left;
            margin-bottom: 24px;
        }

        .card-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .section-content {
            font-size: 0.95rem;
            color: var(--text-gray);
            line-height: 1.7;
        }

        .url-display {
            background: #f0f4f8;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--primary-dark);
            word-break: break-all;
            border-left: 3px solid var(--primary-blue);
        }

        .suggestions-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .suggestions-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-gray);
        }

        .suggestions-list li::before {
            content: '→';
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.8s ease 0.5s both;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(30, 58, 138, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
            border-radius: 10px;
            z-index: -1;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: var(--card-white);
            color: var(--primary-dark);
            border: 2px solid var(--primary-dark);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.1);
        }

        .btn-secondary:hover {
            background: var(--primary-dark);
            color: white;
            transform: translateY(-3px);
        }

        .btn-large {
            padding: 16px 36px;
            font-size: 1.05rem;
        }

        /* ── Footer ── */
        .error-footer {
            font-size: 0.85rem;
            color: var(--text-light);
            animation: fadeIn 0.8s ease 0.6s both;
        }

        .footer-text {
            margin-bottom: 8px;
        }

        .error-code-display {
            font-family: 'Courier New', monospace;
            color: var(--primary-dark);
            font-weight: 600;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-card {
                padding: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .float-1 {
                font-size: 12rem;
            }

            .float-2 {
                font-size: 10rem;
            }
        }
    </style>
</head>

<body>
    <!-- Floating Background Elements -->
    <div class="floating-element float-1">404</div>
    <div class="floating-element float-2">⚠️</div>

    <!-- 404 Error Container -->
    <div class="error-container" id="error404">
        <div class="error-icon">🔍</div>

        <div class="error-code">404</div>

        <h1 class="error-title">Page Not Found</h1>

        <p class="error-description">
            Oops! The page you're looking for doesn't exist or has been moved. Let's help you find what you need.
        </p>

        <!-- <div class="error-card">
            <div class="card-section">
                <div class="section-title">Requested URL</div>
                <div class="url-display" id="url-display">{{ request.path }}</div>
            </div>

            <div class="card-section">
                <div class="section-title">What You Can Do</div>
                <ul class="suggestions-list">
                    <li>Check if the URL is spelled correctly</li>
                    <li>Go back to the previous page using your browser</li>
                    <li>Visit our homepage to start fresh</li>
                    <li>Contact our support team for assistance</li>
                </ul>
            </div>
        </div> -->

        <div class="button-group">
            <a href="/" class="btn btn-primary btn-large">
                🏠 Go to Homepage
            </a>
            <button class="btn btn-secondary btn-large" onclick="history.back()">
                ← Go Back
            </button>
        </div>

        <div class="error-footer">
            <div class="footer-text">Error Code: <span class="error-code-display">404</span> | Not Found</div>
            <div class="footer-text">If you believe this is an error, please contact support</div>
        </div>
    </div>

    <script>
        // Set current URL
        document.getElementById('url-display').textContent = window.location.href;
        console.error('404 Error - Page Not Found');
        console.error('URL:', window.location.href);
    </script>
</body>

</html>
